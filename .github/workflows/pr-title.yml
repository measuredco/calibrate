name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Validates the PR title against Conventional Commits + our scope-enum.
      # The PR title becomes the squash-merge commit subject on `main`, so this
      # is what protects the canonical history (individual PR commits are
      # collapsed by squash and never reach `main`).
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            style
            perf
            ci
            build
            revert
          scopes: |
            adapter
            assets
            config
            core
            react
            system
            repo
          requireScope: true
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character.
