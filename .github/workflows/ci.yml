name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate PR commit messages
        run: pnpm exec commitlint --from origin/${{ github.base_ref }} --to HEAD --verbose

  changeset:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require changeset for public package changes
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          PUBLIC=$(echo "$CHANGED" | grep -E '^packages/(core|react|config|assets)/src/' || true)
          CHANGESET=$(echo "$CHANGED" | grep -E '^\.changeset/[^/]+\.md$' | grep -v '^\.changeset/README\.md$' || true)
          if [ -n "$PUBLIC" ] && [ -z "$CHANGESET" ]; then
            echo "::error::Public package source changed without a changeset. Run \`pnpm changeset\` and commit the result."
            echo "Changed publishable sources:"
            echo "$PUBLIC"
            exit 1
          fi
          echo "Changeset check: OK"

  system:
    runs-on: ubuntu-latest
    needs: repo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate system
        run: pnpm run system:validate

      - name: Verify system dist is up to date
        run: pnpm run system:verify

  core:
    runs-on: ubuntu-latest
    needs: repo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck core
        run: pnpm run core:typecheck

      - name: Test core
        run: pnpm run core:test

      - name: Build core
        run: pnpm run core:build

  react:
    runs-on: ubuntu-latest
    needs: repo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm run core:build

      - name: Typecheck react
        run: pnpm run react:typecheck

      - name: Test react
        run: pnpm run react:test

      - name: Build react
        run: pnpm run react:build

  storybook:
    runs-on: ubuntu-latest
    needs: repo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm run storybook:build

      - name: Install Playwright Chromium
        run: pnpm --filter @measured/calibrate-storybook exec playwright install --with-deps chromium

      - name: Test core a11y
        run: pnpm run storybook:test
