name: release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # OIDC token for npm Trusted Publishing + provenance attestation.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # Trusted Publishing requires npm >= 11.5.1; bulk publisher setup needs
      # >= 11.10.0. Node 24's bundled npm may lag — pin explicitly.
      - name: Pin npm
        run: npm install -g npm@^11.10.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
          commit: "chore(repo): version packages"
          title: "chore(repo): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token-based auth fallback for the initial publish of
          # @measured/calibrate-skills (no trusted publisher configured yet).
          # NPM_TOKEN tells changesets/action to use token publishing rather
          # than OIDC; without it the action picks OIDC and fails for any
          # package that lacks a configured trusted publisher. Remove once
          # skills has trusted publishing set up on npm.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance is normally on (uses the job-scoped id-token: write
          # permission above), but npm 11.x prefers OIDC trusted publishing
          # when provenance is enabled, and trusted publishing fails outright
          # for packages without a configured trusted publisher (no fallback
          # to token auth). Temporarily disabled while @measured/calibrate-skills
          # is being published for the first time. Re-enable once trusted
          # publishing is configured for it on npm.
          # NPM_CONFIG_PROVENANCE: "true"
