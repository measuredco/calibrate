version: 2
updates:
  # Workspace dependencies (root + all packages/apps managed via pnpm).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Cluster minor + patch bumps so the queue stays manageable.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versions (so action pins don't go stale).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
